name: Build / Draft Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '.cache/electron'
          key: ${{ runner.os }}-electron-${{ hashFiles('**/yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Node dependencies
        run: yarn install --no-frozen-lockfile

      - name: Build .NET VpnHelper cmdlet
        run: |
          dotnet restore VpnHelper\VpnHelper.csproj
          dotnet build VpnHelper\VpnHelper.csproj -c Release -o .\VpnHelper\bin\VpnHelper

      - name: Build React app
        run: yarn run build-react-nsis

      - name: Package with electron-builder (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn run electron-builder --win --publish=never

      # ── EV Code Signing via ssl.com eSigner ──────────────────────────────────
      # Signs every .exe in the release folder using the cloud-based EV cert.
      # No hardware token or physical access required — credentials are stored
      # as GitHub Actions secrets and the TOTP is derived automatically.
      # Required secrets: ESIGNER_USERNAME, ESIGNER_PASSWORD,
      #                   ESIGNER_CREDENTIAL_ID, ESIGNER_TOTP_SECRET
      - name: Sign installers with eSigner (EV Code Signing)
        uses: ssl-com/esigner-codesign@v1.0.0
        with:
          username:         ${{ secrets.ESIGNER_USERNAME }}
          password:         ${{ secrets.ESIGNER_PASSWORD }}
          credential_id:    ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret:      ${{ secrets.ESIGNER_TOTP_SECRET }}
          dir_name:         '.\release'
          file_name:        '*.exe'
          environment_name: PROD
          malware_block:    false
          override:         true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $build   = "${{ github.run_number }}"
          $tag     = "v$version-build$build"
          $title   = "VPNUK $version (build $build)"

          foreach ($exe in (Get-ChildItem .\release\*.exe)) {
            $newName = $exe.Name -replace ' ', '-' -replace '\.exe$', "-build$build.exe"
            Rename-Item $exe.FullName (Join-Path $exe.DirectoryName $newName)
          }

          $artifacts = @()
          foreach ($exe in (Get-ChildItem .\release\*.exe)) { $artifacts += $exe.FullName }
          if (Test-Path ".\release\latest.yml") { $artifacts += (Resolve-Path ".\release\latest.yml").Path }

          Write-Host "Tag: $tag"
          Write-Host "Title: $title"
          $artifacts | ForEach-Object { Write-Host "Artifact: $_" }

          gh release create "$tag" --title "$title" --draft --notes "Build $build" @artifacts
