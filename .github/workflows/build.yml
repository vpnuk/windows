name: Build / Draft Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '.cache/electron'
          key: ${{ runner.os }}-electron-${{ hashFiles('**/yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build .NET VpnHelper cmdlet
        run: |
          dotnet restore VpnHelper\VpnHelper.csproj
          dotnet build VpnHelper\VpnHelper.csproj -c Release -o .\VpnHelper\bin\VpnHelper

      - name: Build React app
        run: yarn run build-react-nsis

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn run electron-builder --win --publish=never

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "=== release folder ==="
          Get-ChildItem .\release\*.exe, .\release\*.yml -ErrorAction SilentlyContinue

          # Rename exe (spaces -> hyphens)
          $exes = Get-ChildItem .\release\*.exe
          foreach ($exe in $exes) {
            $slug = $exe.Name -replace ' ', '-'
            if ($exe.Name -ne $slug) {
              Rename-Item $exe.FullName $slug
            }
          }

          # Delete existing release + tag if present (ignore errors)
          gh release delete v1.3.0 --yes --cleanup-tag 2>$null; $true
          git push origin :refs/tags/v1.3.0 2>$null; $true

          # Build file list
          $artifacts = @()
          foreach ($exe in (Get-ChildItem .\release\*.exe)) { $artifacts += $exe.FullName }
          if (Test-Path ".\release\latest.yml") { $artifacts += ".\release\latest.yml" }

          Write-Host "=== uploading ==="
          $artifacts | ForEach-Object { Write-Host $_ }

          gh release create v1.3.0 `
            --title "VPNUK 1.3.0" `
            --draft `
            --notes "" `
            @artifacts
