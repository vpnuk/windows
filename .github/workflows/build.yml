name: Build / Draft Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '.cache/electron'
          key: ${{ runner.os }}-electron-${{ hashFiles('**/yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build .NET VpnHelper cmdlet
        run: |
          dotnet restore VpnHelper\VpnHelper.csproj
          dotnet build VpnHelper\VpnHelper.csproj -c Release -o .\VpnHelper\bin\VpnHelper

      - name: Build React app
        run: yarn run build-react-nsis

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn run electron-builder --win --publish=never

      - name: Rename installer for release
        id: prep
        shell: pwsh
        run: |
          $exe = Get-ChildItem .\release\nsis-web\*.exe | Select-Object -First 1
          $slug = $exe.Name -replace ' ', '-'
          Rename-Item $exe.FullName $slug
          echo "FILE=release/nsis-web/$slug" >> $env:GITHUB_OUTPUT
          echo "VERSION=1.3.0" >> $env:GITHUB_OUTPUT

      - name: Create draft release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: true
          omitBody: true
          tag: "v${{ steps.prep.outputs.VERSION }}"
          name: "VPNUK ${{ steps.prep.outputs.VERSION }}"
          artifacts: "${{ steps.prep.outputs.FILE }},release/nsis-web/latest.yml"
          token: ${{ secrets.GITHUB_TOKEN }}
