name: Build / Draft Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '.cache/electron'
          key: ${{ runner.os }}-electron-${{ hashFiles('**/yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Node dependencies
        run: yarn install --no-frozen-lockfile

      - name: Build .NET VpnHelper cmdlet
        run: |
          dotnet restore VpnHelper\VpnHelper.csproj
          dotnet build VpnHelper\VpnHelper.csproj -c Release -o .\VpnHelper\bin\VpnHelper

      - name: Build React app
        run: yarn run build-react-nsis

      # Download CodeSignTool BEFORE electron-builder so the afterPack hook
      # can sign each arch's VPNUK.exe while it is still unpacked (before NSIS
      # assembles the combined installer from the signed content).
      - name: Download CodeSignTool
        shell: pwsh
        run: |
          $url = "https://github.com/SSLcom/CodeSignTool/releases/download/v1.3.0/CodeSignTool-v1.3.0-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\cst.zip" -UseBasicParsing
          Expand-Archive "$env:TEMP\cst.zip" -DestinationPath "$env:TEMP\cst" -Force
          $bat = (Get-ChildItem "$env:TEMP\cst" -Filter "CodeSignTool.bat" -Recurse | Select-Object -First 1).FullName
          $dir = Split-Path $bat -Parent
          Write-Host "CodeSignTool dir: $dir"
          echo "CST_BAT=$bat"  >> $env:GITHUB_ENV
          echo "CST_DIR=$dir"  >> $env:GITHUB_ENV

      # afterPack.js signs VPNUK.exe for every arch immediately after electron-builder
      # unpacks it, before NSIS assembles the combined installer.
      # The win*-unpacked dirs are intermediate artifacts that may be cleaned up
      # after packaging — what matters is that NSIS read signed exes during assembly.
      - name: Package with electron-builder (signs app exe via afterPack hook)
        env:
          GH_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CODE_SIGN_TOOL_PATH:   ${{ env.CST_DIR }}
          ESIGNER_USERNAME:      ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD:      ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          ESIGNER_TOTP_SECRET:   ${{ secrets.ESIGNER_TOTP_SECRET }}
        run: yarn run electron-builder --win --publish=never

      # Sign the NSIS installer wrappers (.exe files in release/).
      - name: Sign installer wrappers with eSigner
        shell: pwsh
        env:
          ESIGNER_USERNAME:      ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD:      ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          ESIGNER_TOTP_SECRET:   ${{ secrets.ESIGNER_TOTP_SECRET }}
        run: |
          $exes = @(Get-ChildItem .\release\*.exe) +
                  @(Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)
          if (-not $exes) { Write-Warning "No installer .exe found"; exit 0 }
          foreach ($exe in $exes) {
            Write-Host "Signing installer: $($exe.FullName)"
            $inputArg = "-input_file_path=`"$($exe.FullName)`""
            $p = Start-Process `
              -FilePath    $env:CST_BAT `
              -ArgumentList @(
                "sign",
                "-username=$env:ESIGNER_USERNAME",
                "-password=$env:ESIGNER_PASSWORD",
                "-credential_id=$env:ESIGNER_CREDENTIAL_ID",
                "-totp_secret=$env:ESIGNER_TOTP_SECRET",
                $inputArg,
                "-override=true"
              ) `
              -WorkingDirectory $env:CST_DIR `
              -Wait -PassThru -NoNewWindow
            if ($p.ExitCode -ne 0) {
              throw "Signing failed for $($exe.Name) (exit $($p.ExitCode))"
            }
          }

      # Only verify the installer wrappers — the win*-unpacked directories are
      # intermediate build artifacts that electron-builder may clean up or
      # regenerate after the NSIS step. The app exe inside the installer was
      # signed during the afterPack hook (confirmed by "Code signed successfully"
      # log lines above) before NSIS assembled the final package.
      - name: Verify installer signatures
        shell: pwsh
        run: |
          $failed = $false
          $exes = @(Get-ChildItem .\release\*.exe) +
                  @(Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)
          foreach ($exe in $exes) {
            $sig     = Get-AuthenticodeSignature $exe.FullName
            $subject = $sig.SignerCertificate?.Subject ?? "(none)"
            Write-Host "$($exe.Name): status=$($sig.Status)  signer=$subject"
            if ($sig.Status -ne "Valid") {
              Write-Host "ERROR: $($exe.Name) is NOT signed"
              $failed = $true
            }
          }
          if ($failed) { throw "One or more installer wrappers failed signature verification" }
          Write-Host "All installer signatures verified OK."

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $build   = "${{ github.run_number }}"
          $tag     = "v$version-build$build"
          $title   = "VPNUK $version (build $build)"

          foreach ($exe in (Get-ChildItem .\release\*.exe)) {
            $n = $exe.Name -replace ' ', '-' -replace '\.exe$', "-build$build.exe"
            Rename-Item $exe.FullName (Join-Path $exe.DirectoryName $n)
          }
          foreach ($exe in (Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)) {
            $n = $exe.Name -replace ' ', '-' -replace '\.exe$', "-web-build$build.exe"
            Rename-Item $exe.FullName (Join-Path $exe.DirectoryName $n)
          }

          $artifacts = @()
          foreach ($f in (Get-ChildItem .\release\*.exe))                                         { $artifacts += $f.FullName }
          foreach ($f in (Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue))  { $artifacts += $f.FullName }
          foreach ($f in (Get-ChildItem .\release\nsis-web\*.7z  -ErrorAction SilentlyContinue))  { $artifacts += $f.FullName }
          if (Test-Path ".\release\latest.yml") { $artifacts += (Resolve-Path ".\release\latest.yml").Path }

          Write-Host "Tag: $tag | Title: $title"
          $artifacts | ForEach-Object { Write-Host "Artifact: $_" }

          gh release create "$tag" --title "$title" --draft --notes "Build $build" @artifacts
