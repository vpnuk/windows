name: Build / Draft Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '.cache/electron'
          key: ${{ runner.os }}-electron-${{ hashFiles('**/yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Node dependencies
        run: yarn install --no-frozen-lockfile

      - name: Build .NET VpnHelper cmdlet
        run: |
          dotnet restore VpnHelper\VpnHelper.csproj
          dotnet build VpnHelper\VpnHelper.csproj -c Release -o .\VpnHelper\bin\VpnHelper

      - name: Build React app
        run: yarn run build-react-nsis

      - name: Download CodeSignTool
        shell: pwsh
        run: |
          $url = "https://github.com/SSLcom/CodeSignTool/releases/download/v1.3.0/CodeSignTool-v1.3.0-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\cst.zip" -UseBasicParsing
          Expand-Archive "$env:TEMP\cst.zip" -DestinationPath "$env:TEMP\cst" -Force
          $bat = (Get-ChildItem "$env:TEMP\cst" -Filter "CodeSignTool.bat" -Recurse | Select-Object -First 1).FullName
          $dir = Split-Path $bat -Parent
          Write-Host "CodeSignTool dir: $dir"
          echo "CST_BAT=$bat" >> $env:GITHUB_ENV
          echo "CST_DIR=$dir" >> $env:GITHUB_ENV

      # ── Phase 1: unpack all arches (no NSIS installer yet) ────────────────
      # Pass arches explicitly — --win dir alone only builds the default arch.
      # The NSIS assembler re-stamps VPNUK.exe after afterPack runs, stripping
      # any signature.  By separating "dir" from "--prepackaged nsis" we sign
      # once between the two phases and the signature survives into the installer.
      - name: Phase 1 — unpack app (x64, ia32, arm64; no installer)
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn run electron-builder --win dir --x64 --ia32 --arm64 --publish=never

      # ── Phase 2: sign VPNUK.exe in every unpacked arch dir ────────────────
      # CodeSignTool requires absolute paths (-input_file_path / -output_dir_path).
      - name: Phase 2 — sign VPNUK.exe in all arch dirs
        shell: pwsh
        env:
          ESIGNER_USERNAME:      ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD:      ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          ESIGNER_TOTP_SECRET:   ${{ secrets.ESIGNER_TOTP_SECRET }}
        run: |
          $failed = $false
          foreach ($arch in @('win-unpacked', 'win-ia32-unpacked', 'win-arm64-unpacked')) {
            $exeRel = ".\release\$arch\VPNUK.exe"
            if (-not (Test-Path $exeRel)) {
              Write-Host "SKIP (not found): $exeRel"
              continue
            }
            # Absolute paths required by CodeSignTool
            $exe     = (Resolve-Path $exeRel).Path
            $outDir  = "$env:TEMP\signed-$arch"
            New-Item -ItemType Directory -Path $outDir -Force | Out-Null

            $origSize = (Get-Item $exe).Length
            Write-Host "Signing [$arch]  $exe  ($([math]::Round($origSize/1MB,1)) MB)"

            $p = Start-Process `
              -FilePath    $env:CST_BAT `
              -ArgumentList @(
                "sign",
                "-username=$env:ESIGNER_USERNAME",
                "-password=$env:ESIGNER_PASSWORD",
                "-credential_id=$env:ESIGNER_CREDENTIAL_ID",
                "-totp_secret=$env:ESIGNER_TOTP_SECRET",
                "-input_file_path=$exe",
                "-output_dir_path=$outDir",
                "-override=true"
              ) `
              -WorkingDirectory $env:CST_DIR `
              -Wait -PassThru -NoNewWindow

            if ($p.ExitCode -ne 0) {
              Write-Host "ERROR: CodeSignTool exit $($p.ExitCode) for $arch"
              $failed = $true; continue
            }

            $signed = Join-Path $outDir "VPNUK.exe"
            if (-not (Test-Path $signed)) {
              Write-Host "ERROR: signed output not found at $signed"
              $failed = $true; continue
            }

            Copy-Item $signed $exe -Force

            $sig     = Get-AuthenticodeSignature $exe
            $subject = $sig.SignerCertificate?.Subject ?? "(none)"
            Write-Host "  -> status=$($sig.Status)  signer=$subject  size=$((Get-Item $exe).Length)"
            if ($sig.Status -ne 'Valid') {
              Write-Host "ERROR: signature invalid for $arch\VPNUK.exe"
              $failed = $true
            }
          }
          if ($failed) { throw "One or more VPNUK.exe files could not be signed." }
          Write-Host "All VPNUK.exe files signed OK."

      # ── Phase 3: build NSIS installers from the pre-signed dirs ──────────
      # --prepackaged tells electron-builder to skip packing and build the
      # installer from the supplied pre-existing directory.
      # nsis (multi-arch x64+ia32+arm64) and nsis-web (x64 stub + 7z) are
      # both built from the signed win-unpacked x64 dir.
      - name: Phase 3 — build NSIS installers from pre-signed x64 dir
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: pwsh
        run: |
          $preDir = (Resolve-Path ".\release\win-unpacked").Path
          Write-Host "Pre-packaged dir: $preDir"
          yarn run electron-builder --win nsis     --x64 --prepackaged $preDir --publish=never
          yarn run electron-builder --win nsis-web --x64 --prepackaged $preDir --publish=never

      # ── Diagnostic: confirm VPNUK.exe is signed at each point ─────────────
      - name: Diagnose — signatures in win*-unpacked and nsis-web 7z
        shell: pwsh
        run: |
          Write-Host "=== win*-unpacked VPNUK.exe (after Phase 3) ==="
          foreach ($dir in (Get-ChildItem .\release -Directory -Filter "win*-unpacked")) {
            $exe = Join-Path $dir.FullName "VPNUK.exe"
            if (Test-Path $exe) {
              $sig = Get-AuthenticodeSignature $exe
              Write-Host "$($dir.Name)\VPNUK.exe  size=$((Get-Item $exe).Length)  status=$($sig.Status)  signer=$($sig.SignerCertificate?.Subject ?? '(none)')"
            }
          }
          Write-Host ""
          Write-Host "=== VPNUK.exe inside nsis-web 7z ==="
          $z = Get-ChildItem .\release\nsis-web\*.7z -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($z) {
            $outTmp = "$env:TEMP\nsis7z_check"
            New-Item -ItemType Directory -Path $outTmp -Force | Out-Null
            & 7z e $z.FullName VPNUK.exe "-o$outTmp" -y | Out-Null
            $extracted = Join-Path $outTmp "VPNUK.exe"
            if (Test-Path $extracted) {
              $sig = Get-AuthenticodeSignature $extracted
              Write-Host "$($z.Name) -> VPNUK.exe  size=$((Get-Item $extracted).Length)  status=$($sig.Status)  signer=$($sig.SignerCertificate?.Subject ?? '(none)')"
            } else {
              Write-Host "VPNUK.exe not found in 7z root — listing:"
              & 7z l $z.FullName VPNUK.exe
            }
          } else {
            Write-Host "No nsis-web 7z found"
          }

      - name: Sign installer wrappers with eSigner
        shell: pwsh
        env:
          ESIGNER_USERNAME:      ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD:      ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          ESIGNER_TOTP_SECRET:   ${{ secrets.ESIGNER_TOTP_SECRET }}
        run: |
          $exes = @(Get-ChildItem .\release\*.exe) +
                  @(Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)
          if (-not $exes) { Write-Warning "No installer .exe found"; exit 0 }
          foreach ($exe in $exes) {
            Write-Host "Signing installer: $($exe.FullName)"
            $p = Start-Process `
              -FilePath    $env:CST_BAT `
              -ArgumentList @(
                "sign",
                "-username=$env:ESIGNER_USERNAME",
                "-password=$env:ESIGNER_PASSWORD",
                "-credential_id=$env:ESIGNER_CREDENTIAL_ID",
                "-totp_secret=$env:ESIGNER_TOTP_SECRET",
                "-input_file_path=`"$($exe.FullName)`"",
                "-override=true"
              ) `
              -WorkingDirectory $env:CST_DIR `
              -Wait -PassThru -NoNewWindow
            if ($p.ExitCode -ne 0) {
              throw "Signing failed for $($exe.Name) (exit $($p.ExitCode))"
            }
          }

      - name: Verify installer signatures
        shell: pwsh
        run: |
          $failed = $false
          $exes = @(Get-ChildItem .\release\*.exe) +
                  @(Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)
          foreach ($exe in $exes) {
            $sig     = Get-AuthenticodeSignature $exe.FullName
            $subject = $sig.SignerCertificate?.Subject ?? "(none)"
            Write-Host "$($exe.Name): status=$($sig.Status)  signer=$subject"
            if ($sig.Status -ne "Valid") {
              Write-Host "ERROR: $($exe.Name) is NOT signed"
              $failed = $true
            }
          }
          if ($failed) { throw "One or more installer wrappers failed signature verification" }
          Write-Host "All installer signatures verified OK."

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $build   = "${{ github.run_number }}"
          $tag     = "v$version-build$build"
          $title   = "VPNUK $version (build $build)"

          foreach ($exe in (Get-ChildItem .\release\*.exe)) {
            $n = $exe.Name -replace ' ', '-' -replace '\.exe$', "-build$build.exe"
            Rename-Item $exe.FullName (Join-Path $exe.DirectoryName $n)
          }
          foreach ($exe in (Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue)) {
            $n = $exe.Name -replace ' ', '-' -replace '\.exe$', "-web-build$build.exe"
            Rename-Item $exe.FullName (Join-Path $exe.DirectoryName $n)
          }

          $artifacts = @()
          foreach ($f in (Get-ChildItem .\release\*.exe))                                         { $artifacts += $f.FullName }
          foreach ($f in (Get-ChildItem .\release\nsis-web\*.exe -ErrorAction SilentlyContinue))  { $artifacts += $f.FullName }
          foreach ($f in (Get-ChildItem .\release\nsis-web\*.7z  -ErrorAction SilentlyContinue))  { $artifacts += $f.FullName }
          if (Test-Path ".\release\latest.yml") { $artifacts += (Resolve-Path ".\release\latest.yml").Path }

          Write-Host "Tag: $tag | Title: $title"
          $artifacts | ForEach-Object { Write-Host "Artifact: $_" }

          gh release create "$tag" --title "$title" --draft --notes "Build $build" @artifacts
